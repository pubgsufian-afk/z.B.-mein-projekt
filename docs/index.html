<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeiterfassung Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 20px;
      color: #1f2937;
    }
    .box {
      max-width: 700px;
      margin: 40px auto;
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      color: #2563eb;
    }
    .btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 10px;
      margin-top: 12px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Mitarbeiter-Zeiterfassung</h1>
    <p>Das ist die erste kostenlose Testseite.</p>

    <input type="text" placeholder="E-Mail">
    <input type="password" placeholder="Passwort">
    <button class="btn">Login</button>

    <p style="margin-top:20px;">Test-Vorschau der Webseite</p>
  </div>
</body>
</html>
