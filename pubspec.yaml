publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.26
  path_provider: ^2.1.4
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2
  flutter_local_notifications: ^17.2.3
  local_auth: ^2.3.0
  webview_flutter: ^4.9.0
  url_launcher: ^6.3.0
  file_picker: ^8.1.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.3
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
